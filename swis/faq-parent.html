<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--dark);padding:12px 24px;display:flex;align-items:center;gap:12px;color:#fff;position:sticky;top:0;z-index:100;flex-wrap:wrap}

.search-brand{text-align:center;margin-bottom:32px;transition:all .4s ease}
.search-brand .icon{width:72px;height:72px;background:var(--accent);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:16px}

.search-box::placeholder{color:#ccc}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.10);max-height:380px;overflow-y:auto;display:none;z-index:200}

.ac-item:hover{background:var(--accent-light)}
.ac-item .ac-cat{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin-right:8px}

.dept-btn:hover{border-color:var(--accent);color:var(--accent)}
.dept-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hint-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px;max-width:760px}
.hint-chip{padding:6px 14px;border-radius:99px;border:1px solid #e8e8e8;background:#fff;font-family:'Kanit',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s}
.hint-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.results{width:100%;max-width:800px;margin-top:24px;display:none}
.result-count{font-size:13px;color:var(--muted);margin-bottom:16px}
.cat-group{margin-bottom:24px}
.cat-label{font-size:14px;font-weight:600;color:var(--accent);padding:8px 16px;background:var(--accent-light);border-radius:10px;margin-bottom:10px}
.faq-item{background:var(--card);border-radius:var(--radius);padding:16px 20px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.faq-item:hover{box-shadow:0 4px 20px rgba(0,0,0,.10)}

.faq-item.open .a{display:block}

.report-link:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(123,31,162,.30)}
.no-results{text-align:center;padding:48px 24px;color:var(--muted)}
.no-results .icon{font-size:48px;margin-bottom:12px}

function norm(s) {
  return s.replace(/ฯ/g,'').replace(/\./g,'').toLowerCase().trim();
}

const searchBox=document.getElementById('searchBox'),
      acBox=document.getElementById('autocomplete'),
      results=document.getElementById('results'),
      stage=document.getElementById('stage'),
      hintChips=document.getElementById('hintChips'),
      deptFilter=document.getElementById('deptFilter');
let activeDept='all';

const faqNorm = FAQ.map(f => ({
  ...f,
  _s: norm(f.q + ' ' + f.tags)
}));

deptFilter.querySelectorAll('.dept-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    deptFilter.querySelectorAll('.dept-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeDept=btn.dataset.dept;
    if(searchBox.value.trim())doSearch(searchBox.value);
    else showAll();
  });
});

document.querySelectorAll('.hint-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    searchBox.value=chip.textContent;
    doSearch(chip.textContent);
  });
});

searchBox.addEventListener('input',function(){
  const raw=this.value.trim();
  if(raw.length<2){acBox.style.display='none';results.style.display='none';stage.classList.remove('has-results');hintChips.style.display='flex';return}
  const terms=norm(raw).split(/\s+/).filter(t=>t);
  const matches=faqNorm.filter(f=>{
    if(activeDept!=='all'&&f.cat!==activeDept)return false;
    return terms.every(t=>f._s.includes(t));
  }).slice(0,12);
  if(!matches.length){acBox.style.display='none';return}
  acBox.innerHTML=matches.map(m=>{
    return`<div class="ac-item" data-q="${m.q}"><span class="ac-cat">${m.cat}</span>${m.q}</div>`;
  }).join('');
  acBox.style.display='block';
  acBox.querySelectorAll('.ac-item').forEach(item=>{
    item.addEventListener('click',()=>{
      searchBox.value=item.dataset.q;acBox.style.display='none';doSearch(item.dataset.q);
    });
  });
});

searchBox.addEventListener('keydown',function(e){if(e.key==='Enter'){acBox.style.display='none';doSearch(this.value)}});
document.addEventListener('click',(e)=>{if(!e.target.closest('.search-wrap'))acBox.style.display='none'});

function showAll(){
  const f=activeDept==='all'?faqNorm:faqNorm.filter(f=>f.cat===activeDept);
  renderResults(f,'');
}

function doSearch(query){
  const raw=query.trim();
  if(!raw){results.style.display='none';stage.classList.remove('has-results');hintChips.style.display='flex';return}
  const terms=norm(raw).split(/\s+/).filter(t=>t);
  const matches=faqNorm.filter(f=>{
    if(activeDept!=='all'&&f.cat!==activeDept)return false;
    return terms.every(t=>f._s.includes(t));
  });
  renderResults(matches,raw);
}

function renderResults(matches,query){
  stage.classList.add('has-results');hintChips.style.display='none';results.style.display='block';
  if(!matches.length){results.innerHTML=`<div class="no-results"><div class="icon">🔍</div><p>ไม่พบรายงานที่ตรงกับ "${query}"</p></div>`;return}
  const groups={};
  matches.forEach(m=>{if(!groups[m.cat])groups[m.cat]=[];groups[m.cat].push(m)});
  let html=`<div class="result-count">พบ ${matches.length} รายงาน จาก ${Object.keys(groups).length} หมวด</div>`;
  Object.entries(groups).forEach(([cat,items])=>{
    html+=`<div class="cat-group"><div class="cat-label">${cat} (${items.length})</div>`;
    items.forEach(item=>{
      html+=`<div class="faq-item" onclick="this.classList.toggle('open')"><div class="q"><span class="q-cat">${item.cat}</span><span>${item.q}</span></div><div class="a">${item.a}</div></div>`;
    });
    html+=`</div>`;
  });
  results.innerHTML=html;
}
</script>
